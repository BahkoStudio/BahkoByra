name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment structure
        run: |
          mkdir -p dist/kliniker dist/brand

          # Agency site → root
          cp bahkobyra/index.html dist/index.html
          cp bahkobyra/pitchdeck.html dist/pitchdeck.html

          # Clinic demo + CRM
          cp kliniker/elara-klinik-demo-v2.html dist/kliniker/elara-klinik-demo-v2.html
          cp kliniker/crm.html dist/kliniker/crm.html

          # Brand assets
          cp brand/* dist/brand/ 2>/dev/null || true

          # Custom domain
          echo "bahkobyra.se" > dist/CNAME

      - name: Deploy to BahkoStudio/BahkoByra gh-pages (bahkobyra.se)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

  deploy-demo:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build demo structure (bahkobyra.cloud)
        run: |
          mkdir -p dist-demo/kliniker

          # Clinic demo at root + kliniker path
          cp kliniker/elara-klinik-demo-v2.html dist-demo/index.html
          cp kliniker/elara-klinik-demo-v2.html dist-demo/kliniker/elara-klinik-demo-v2.html

          # Custom domain
          echo "bahkobyra.cloud" > dist-demo/CNAME

      - name: Deploy to BahkoStudio/Demo gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEMO_REPO_TOKEN }}
          external_repository: BahkoStudio/Demo
          publish_dir: ./dist-demo
          publish_branch: gh-pages
          force_orphan: true

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dashboard (KlinikCRM)
        run: |
          mkdir -p dist-dash
          cp kliniker/crm.html dist-dash/index.html

      - name: Deploy to BahkoStudio/Dashboard gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEMO_REPO_TOKEN }}
          external_repository: BahkoStudio/Dashboard
          publish_dir: ./dist-dash
          publish_branch: gh-pages
          force_orphan: true

  deploy-pitchdeck:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pitchdeck structure
        run: |
          mkdir -p dist-pitch
          cp bahkobyra/pitchdeck.html dist-pitch/index.html

      - name: Deploy to BahkoStudio/pitchdeck gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEMO_REPO_TOKEN }}
          external_repository: BahkoStudio/pitchdeck
          publish_dir: ./dist-pitch
          publish_branch: gh-pages
          force_orphan: true

  deploy-maykas:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Maykas site
        run: |
          mkdir -p dist-maykas
          cp -r .claude/skills/video-to-website/maykas/site/. dist-maykas/
          echo "maykaskitchen.se" > dist-maykas/CNAME

      - name: Deploy to BahkoStudio/MaykaKitchen gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEMO_REPO_TOKEN }}
          external_repository: BahkoStudio/MaykaKitchen
          publish_dir: ./dist-maykas
          publish_branch: gh-pages
          force_orphan: true
